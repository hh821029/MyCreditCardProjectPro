<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyCreditCardProjectPro 控制台 - 主頁</title>
    <!-- 引入高品質字型 Outfit -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- 引入通用外部樣式表 -->
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="container">
        <h1>📊 MyCreditCardProjectPro 控制台</h1>

        <!-- 簡單的導覽超連結 -->
        <div class="nav-bar">
            <span class="active">🏠 主控制台</span> |
            <a href="sync_config.html">⚙️ 設定同步面板</a>
        </div>

        <!-- 區塊一：帳單資料載入與處理 (ETL) -->
        <div class="section-box">
            <div class="section-title">📦 帳單資料處理 (ETL 流程)</div>
            <p style="margin: 0 0 15px 0; font-size: 13px; color: var(--text-secondary);">載入原始信用卡帳單資料並寫入 SQLite 資料庫主表。
            </p>
            <div class="button-group">
                <button id="btnEtl" class="btn-primary" onclick="runTask('etl')">🚀 執行 ETL 流程</button>
                <button id="btnClear" class="btn-secondary" onclick="clearConsole()">🧹 清空控制台</button>
            </div>
        </div>

        <!-- 區塊二：數據分析與回饋計算 -->
        <div class="section-box">
            <div class="section-title">📊 數據分析與回饋計算</div>
            <p style="margin: 0 0 15px 0; font-size: 13px; color: var(--text-secondary);">執行 RFM
                行為特徵分析，或呼叫回饋引擎計算各筆交易的現金/紅利回饋。</p>

            <div class="button-group" style="margin-bottom: 20px;">
                <button id="btnFetch" class="btn-primary" style="background: linear-gradient(135deg, #ec4899, #8b5cf6);"
                    onclick="fetchAnalyzableData()">🔍 取得目前可分析資料</button>
                <button id="btnAnalysis" onclick="runTask('analytics')" disabled>📊 執行 RFM 分析</button>
                <button id="btnRewards" onclick="runTask('rewards')" disabled>💰 計算回饋金</button>
                <button id="btnExport" onclick="runTask('query_export')" disabled style="background: linear-gradient(135deg, #10b981, #059669); border: none;">📥 篩選與匯出 CSV</button>
            </div>

            <!-- 可分析資料篩選區 (預設隱藏，待資料取得後顯示) -->
            <div id="filterSection" class="filter-section" style="display: none;">
                <div class="filter-title">⚙️ 可分析資料篩選設定</div>
                <div class="filter-container">
                    <!-- 銀行卡別卡片 -->
                    <div class="filter-card">
                        <div class="filter-card-header">
                            <span>🏦 銀行別名</span>
                            <div class="filter-actions">
                                <span class="filter-link" onclick="toggleAll('bank', true)">全選</span>
                                <span class="filter-link" onclick="toggleAll('bank', false)">清除</span>
                            </div>
                        </div>
                        <div id="bankList" class="filter-list"></div>
                    </div>

                    <!-- 信用卡名稱 -->
                    <div class="filter-card">
                        <div class="filter-card-header">
                            <span>💳 卡片名稱</span>
                            <div class="filter-actions">
                                <span class="filter-link" onclick="toggleAll('card', true)">全選</span>
                                <span class="filter-link" onclick="toggleAll('card', false)">清除</span>
                            </div>
                        </div>
                        <div id="cardList" class="filter-list"></div>
                    </div>

                    <!-- 第三方支付 -->
                    <div class="filter-card">
                        <div class="filter-card-header">
                            <span>📱 第三方支付</span>
                            <div class="filter-actions">
                                <span class="filter-link" onclick="toggleAll('payment', true)">全選</span>
                                <span class="filter-link" onclick="toggleAll('payment', false)">清除</span>
                            </div>
                        </div>
                        <div id="paymentList" class="filter-list"></div>
                    </div>

                    <!-- 日期與地點篩選 -->
                    <div class="filter-card">
                        <div class="filter-card-header">
                            <span>📅 日期與地點範圍</span>
                        </div>
                        <div class="filter-list" style="max-height: none; overflow-y: visible; gap: 8px;">
                            <!-- 時間區間 Preset Checkboxes -->
                            <div style="display: flex; flex-direction: column; gap: 4px;">
                                <span style="font-size: 11px; color: var(--text-secondary); margin-bottom: 2px;">快速時間篩選 (迄日為今日)</span>
                                <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 4px;">
                                    <label class="checkbox-label" style="padding: 2px 4px;">
                                        <input type="checkbox" name="timePreset" value="LAST_MONTH" onchange="handleTimePresetClick(this)"> 近一個月
                                    </label>
                                    <label class="checkbox-label" style="padding: 2px 4px;">
                                        <input type="checkbox" name="timePreset" value="LAST_QUARTER" onchange="handleTimePresetClick(this)"> 近一季
                                    </label>
                                    <label class="checkbox-label" style="padding: 2px 4px;">
                                        <input type="checkbox" name="timePreset" value="LAST_HALF_YEAR" onchange="handleTimePresetClick(this)"> 近半年
                                    </label>
                                    <label class="checkbox-label" style="padding: 2px 4px;">
                                        <input type="checkbox" name="timePreset" value="LAST_YEAR" onchange="handleTimePresetClick(this)"> 近一年
                                    </label>
                                </div>
                            </div>
                            <!-- 自訂起迄時間 -->
                            <div style="display: flex; gap: 8px; margin-top: 4px;">
                                <div style="display: flex; flex-direction: column; gap: 2px; flex: 1;">
                                    <span style="font-size: 11px; color: var(--text-secondary);">自訂起日</span>
                                    <input type="date" id="startDate" style="background-color: var(--card-bg); border: 1px solid var(--btn-border); border-radius: 4px; padding: 4px 6px; color: var(--text-primary); font-family: var(--font-family); font-size: 12px; width: 100%; box-sizing: border-box;">
                                </div>
                                <div style="display: flex; flex-direction: column; gap: 2px; flex: 1;">
                                    <span style="font-size: 11px; color: var(--text-secondary);">自訂迄日</span>
                                    <input type="date" id="endDate" style="background-color: var(--card-bg); border: 1px solid var(--btn-border); border-radius: 4px; padding: 4px 6px; color: var(--text-primary); font-family: var(--font-family); font-size: 12px; width: 100%; box-sizing: border-box;">
                                </div>
                            </div>
                            <!-- 地點下拉選單 -->
                            <div style="display: flex; flex-direction: column; gap: 2px; margin-top: 6px;">
                                <span style="font-size: 11px; color: var(--text-secondary);">地點篩選 (兩碼國家代碼)</span>
                                <select id="locationSelect" style="background-color: var(--card-bg); border: 1px solid var(--btn-border); border-radius: 4px; padding: 4px 6px; color: var(--text-primary); font-family: var(--font-family); font-size: 12px; width: 100%; cursor: pointer;">
                                    <option value="">全部地區</option>
                                </select>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 互動狀態引導 -->
        <div id="status" class="status-box">目前狀態：閒置中 (等待指令啟動)</div>

        <!-- 即時日誌控制台 -->
        <div id="console" class="console">--- 等待指令啟動 ---</div>
    </div>

    <script>
        let eventSource = null;
        let isFirstAnalyzableFetch = true;

        function appendLog(message) {
            const consoleDiv = document.getElementById('console');
            const span = document.createElement('span');

            // 關鍵字上色
            if (message.includes('INFO')) span.className = 'log-info';
            else if (message.includes('WARNING')) span.className = 'log-warning';
            else if (message.includes('ERROR')) span.className = 'log-error';

            if (message.includes('✅') || message.includes('🎉') || message.includes('成功') || message.includes('完畢')) {
                span.className = 'log-success';
            }

            span.textContent = message + '\n';
            consoleDiv.appendChild(span);

            // 自動捲動
            consoleDiv.scrollTop = consoleDiv.scrollHeight;
        }

        function clearConsole() {
            document.getElementById('console').innerHTML = '--- 控制台已清空 ---';
        }

        function toggleAll(name, checked) {
            const checkboxes = document.querySelectorAll(`input[name="${name}"]`);
            checkboxes.forEach(cb => cb.checked = checked);
        }

        function fetchAnalyzableData() {
            const btnFetch = document.getElementById('btnFetch');
            
            // 首次點擊：自動觸發所有設定同步 (config_all)
            if (isFirstAnalyzableFetch) {
                btnFetch.disabled = true;
                btnFetch.textContent = '⚙️ 正在同步設定檔...';
                appendLog(`\n[${new Date().toLocaleTimeString()}] >>>>> 首次讀取，自動啟動設定同步流程 <<<<<`);
                
                const allButtons = document.querySelectorAll('button');
                const statusDiv = document.getElementById('status');
                
                // 鎖定所有按鈕
                allButtons.forEach(btn => btn.disabled = true);
                statusDiv.textContent = `目前狀態：首次讀取，正在執行 [所有設定同步] 中...`;
                statusDiv.className = "status-box status-busy";
                
                if (eventSource) {
                    eventSource.close();
                }
                
                eventSource = new EventSource('/api/run/config_all');
                
                eventSource.onmessage = function (event) {
                    appendLog(event.data);
                };
                
                eventSource.onerror = function (err) {
                    console.log("SSE Stream ended.");
                    eventSource.close();
                    eventSource = null;
                    
                    isFirstAnalyzableFetch = false; // 標記為已同步
                    
                    // 解鎖所有按鈕
                    allButtons.forEach(btn => btn.disabled = false);
                    statusDiv.textContent = `目前狀態：設定同步完成 (閒置中)`;
                    statusDiv.className = "status-box";
                    appendLog(`[${new Date().toLocaleTimeString()}] <<<<< 設定同步完成，開始取得可分析資料 <<<<<`);
                    
                    // 連動呼叫真正讀取資料
                    fetchAnalyzableData();
                };
                return;
            }

            // 正常加載可分析資料 API 流程
            btnFetch.disabled = true;
            btnFetch.textContent = '🔍 正在取得可分析資料...';

            appendLog(`\n[${new Date().toLocaleTimeString()}] >>>>> 啟動讀取可分析資料 API <<<<<`);

            fetch('/api/analyzable-data')
                .then(res => res.json())
                .then(data => {
                    if (data.error) {
                        appendLog(`❌ 取得資料失敗: ${data.error}`);
                        alert(`取得資料失敗: ${data.error}`);
                        btnFetch.disabled = false;
                        btnFetch.textContent = '🔍 取得目前可分析資料';
                        return;
                    }

                    // 1. 渲染銀行別
                    const bankList = document.getElementById('bankList');
                    bankList.innerHTML = '';
                    if (data.banks && data.banks.length > 0) {
                        data.banks.forEach(bank => {
                            const label = document.createElement('label');
                            label.className = 'checkbox-label';
                            label.innerHTML = `<input type="checkbox" name="bank" value="${bank}" checked> ${bank}`;
                            bankList.appendChild(label);
                        });
                    } else {
                        bankList.innerHTML = '<span style="color: #64748b; font-size: 13px; padding: 6px;">無銀行資料</span>';
                    }

                    // 2. 渲染卡片名稱
                    const cardList = document.getElementById('cardList');
                    cardList.innerHTML = '';
                    if (data.cards && data.cards.length > 0) {
                        data.cards.forEach(card => {
                            const label = document.createElement('label');
                            label.className = 'checkbox-label';
                            label.innerHTML = `<input type="checkbox" name="card" value="${card}" checked> ${card}`;
                            cardList.appendChild(label);
                        });
                    } else {
                        cardList.innerHTML = '<span style="color: #64748b; font-size: 13px; padding: 6px;">無卡片資料</span>';
                    }

                    // 3. 渲染第三方支付
                    const paymentList = document.getElementById('paymentList');
                    paymentList.innerHTML = '';
                    if (data.payment_processes && data.payment_processes.length > 0) {
                        data.payment_processes.forEach(pay => {
                            const label = document.createElement('label');
                            label.className = 'checkbox-label';
                            label.innerHTML = `<input type="checkbox" name="payment" value="${pay}" checked> ${pay}`;
                            paymentList.appendChild(label);
                        });
                    } else {
                        paymentList.innerHTML = '<span style="color: #64748b; font-size: 13px; padding: 6px;">無支付管道資料</span>';
                    }

                    // 4. 渲染地點代碼選單
                    const locationSelect = document.getElementById('locationSelect');
                    locationSelect.innerHTML = '<option value="">全部地區</option>';
                    if (data.locations && data.locations.length > 0) {
                        data.locations.forEach(loc => {
                            const opt = document.createElement('option');
                            opt.value = loc;
                            opt.textContent = loc;
                            locationSelect.appendChild(opt);
                        });
                    }

                    // 顯示篩選區域
                    document.getElementById('filterSection').style.display = 'block';

                    // 啟用分析、回饋與匯出按鈕
                    document.getElementById('btnAnalysis').disabled = false;
                    document.getElementById('btnRewards').disabled = false;
                    document.getElementById('btnExport').disabled = false;

                    btnFetch.disabled = false;
                    btnFetch.textContent = '🔄 重新取得可分析資料';
                    appendLog('✅ 成功取得可分析的銀行、卡片、第三方支付及地點清單，已啟用分析、回饋與篩選匯出按鈕。');
                })
                .catch(err => {
                    console.error(err);
                    appendLog(`❌ 連線失敗，無法取得可分析資料`);
                    alert('連線失敗，請確認 API 伺服器是否正常運行。');
                    btnFetch.disabled = false;
                    btnFetch.textContent = '🔍 取得目前可分析資料';
                });
        }

        function handleTimePresetClick(clickedCb) {
            const presets = document.querySelectorAll('input[name="timePreset"]');
            const startDateInput = document.getElementById('startDate');
            const endDateInput = document.getElementById('endDate');
            
            if (clickedCb.checked) {
                // 取消勾選其他時間 preset
                presets.forEach(cb => {
                    if (cb !== clickedCb) cb.checked = false;
                });
                // 禁用自訂日期輸入
                startDateInput.disabled = true;
                endDateInput.disabled = true;
                startDateInput.value = '';
                endDateInput.value = '';
            } else {
                // 啟用自訂日期輸入
                startDateInput.disabled = false;
                endDateInput.disabled = false;
            }
        }

        function runTask(type) {
            if (eventSource) {
                eventSource.close();
            }

            const allButtons = document.querySelectorAll('button');
            const statusDiv = document.getElementById('status');

            // 鎖定所有按鈕防止重疊執行
            allButtons.forEach(btn => btn.disabled = true);

            // 變更狀態文字與視覺標記
            statusDiv.textContent = `目前狀態：正在執行 [${type.toUpperCase()}] 任務中...`;
            statusDiv.className = "status-box status-busy";

            appendLog(`\n[${new Date().toLocaleTimeString()}] >>>>> 啟動 ${type.toUpperCase()} 任務 <<<<<`);

            // 收集核取與輸入篩選條件
            const checkedBanks = Array.from(document.querySelectorAll('input[name="bank"]:checked')).map(cb => cb.value);
            const checkedCards = Array.from(document.querySelectorAll('input[name="card"]:checked')).map(cb => cb.value);
            const checkedPayments = Array.from(document.querySelectorAll('input[name="payment"]:checked')).map(cb => cb.value);
            
            const checkedPreset = document.querySelector('input[name="timePreset"]:checked');
            const timeWindow = checkedPreset ? checkedPreset.value : '';
            const startDate = document.getElementById('startDate').value;
            const endDate = document.getElementById('endDate').value;
            const location = document.getElementById('locationSelect').value;

            const params = new URLSearchParams();
            if (checkedBanks.length > 0) params.append('banks', checkedBanks.join(','));
            if (checkedCards.length > 0) params.append('cards', checkedCards.join(','));
            if (checkedPayments.length > 0) params.append('payments', checkedPayments.join(','));
            if (timeWindow) params.append('time_window', timeWindow);
            if (startDate) params.append('start_date', startDate);
            if (endDate) params.append('end_date', endDate);
            if (location) params.append('location', location);

            const paramsStr = params.toString();
            const url = `/api/run/${type}` + (paramsStr ? `?${paramsStr}` : '');
            
            eventSource = new EventSource(url);

            eventSource.onmessage = function (event) {
                appendLog(event.data);
            };

            eventSource.onerror = function (err) {
                console.log("SSE Stream ended.");
                eventSource.close();
                eventSource = null;

                // 解鎖所有按鈕
                allButtons.forEach(btn => btn.disabled = false);

                statusDiv.textContent = `目前狀態：[${type.toUpperCase()}] 任務執行結束 (閒置中)`;
                statusDiv.className = "status-box";
                appendLog(`[${new Date().toLocaleTimeString()}] <<<<< ${type.toUpperCase()} 任務完成 >>>>>\n`);
            };
        }
    </script>
</body>

</html>

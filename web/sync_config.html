<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyCreditCardProjectPro 控制台 - 設定同步</title>
    <style>
        /* 基礎簡約排版，與主頁完全對齊 */
        body {
            font-family: Arial, sans-serif;
            background-color: #fafafa;
            margin: 0;
            padding: 20px;
            color: #333;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: #ffffff;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 6px;
        }

        h1 {
            color: #222;
            border-bottom: 2px solid #333;
            padding-bottom: 10px;
            margin-top: 0;
        }

        /* 簡單的超連結導覽列 */
        .nav-bar {
            background-color: #f0f0f0;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            margin-bottom: 20px;
        }

        .nav-bar a {
            text-decoration: none;
            color: #0066cc;
            font-weight: bold;
            margin-right: 15px;
        }

        .nav-bar a:hover {
            text-decoration: underline;
        }

        .nav-bar span.active {
            font-weight: bold;
            color: #333;
            margin-right: 15px;
        }

        /* 功能區塊排版 */
        .section-box {
            border: 1px solid #ddd;
            padding: 15px;
            border-radius: 4px;
            margin-bottom: 20px;
            background-color: #fcfcfc;
        }

        .section-title {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 10px;
            color: #444;
            border-left: 4px solid #0066cc;
            padding-left: 8px;
        }

        .button-group {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }

        button {
            padding: 10px 18px;
            font-size: 14px;
            font-weight: bold;
            border: 1px solid #bbb;
            border-radius: 4px;
            background-color: #f5f5f5;
            cursor: pointer;
            color: #333;
            transition: background-color 0.1s;
        }

        button:hover {
            background-color: #e0e0e0;
        }

        button:disabled {
            background-color: #eee;
            color: #999;
            border-color: #ddd;
            cursor: not-allowed;
        }

        .btn-primary {
            background-color: #0066cc;
            color: white;
            border-color: #0052a3;
        }

        .btn-primary:hover {
            background-color: #0052a3;
        }

        .btn-secondary {
            background-color: #777;
            color: white;
            border-color: #666;
        }

        .btn-secondary:hover {
            background-color: #666;
        }

        /* 狀態引導欄 */
        .status-box {
            background-color: #eef7f2;
            border: 1px solid #ccebd9;
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 20px;
            font-weight: bold;
            color: #1b5e20;
        }

        .status-busy {
            background-color: #fff3cd;
            border-color: #ffeeba;
            color: #856404;
        }

        /* 標準控制台 */
        .console {
            background-color: #1e1e1e;
            color: #d4d4d4;
            padding: 15px;
            border-radius: 4px;
            font-family: monospace;
            height: 400px;
            overflow-y: auto;
            white-space: pre-wrap;
            font-size: 13px;
            line-height: 1.5;
            border: 1px solid #333;
        }

        .log-info {
            color: #85c1e9;
        }

        .log-warning {
            color: #f8c471;
        }

        .log-error {
            color: #f1948a;
        }

        .log-success {
            color: #82e0aa;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>MyCreditCardProjectPro 設定同步面板</h1>

        <!-- 導覽超連結 -->
        <div class="nav-bar">
            <a href="index.html">🏠 主控制台</a> | 
            <span class="active">⚙️ 設定同步面板</span>
        </div>

        <!-- 區塊一：單項資料同步 -->
        <div class="section-box">
            <div class="section-title">📄 單項資料同步 (CSV ➡️ SQLite)</div>
            <p style="margin: 0 0 12px 0; font-size: 13px; color: #666;">將指定 CSV 檔案中的設定資料更新或合併寫入至資料庫中。</p>
            <div class="button-group">
                <button id="btnConfig_Card" onclick="runTask('config_card')">💳 信用卡資料載入</button>
                <button id="btnConfig_Reward" onclick="runTask('config_reward')">📜 回饋規則載入</button>
                <button id="btnConfig_Mer" onclick="runTask('config_mer')">🏪 商家資料載入</button>
                <button id="btnConfig_PayGate" onclick="runTask('config_paygate')">👛 支付錢包資料載入</button>
                <button id="btnConfig_BillingHistory" onclick="runTask('config_billing_history')">📅 對帳單歷史載入</button>
                <button id="btnConfig_FxTable" onclick="runTask('config_fx_table')">💱 匯率每日表載入</button>
            </div>
        </div>

        <!-- 區塊二：全量設定同步與操作 -->
        <div class="section-box">
            <div class="section-title">🔄 全量設定同步</div>
            <p style="margin: 0 0 12px 0; font-size: 13px; color: #666;">執行所有 CSV 設定檔案的一鍵同步與資料庫載入。</p>
            <div class="button-group">
                <button id="btnConfig_All" class="btn-primary" onclick="runTask('config_all')">⚙️ 所有設定資料同步</button>
                <button id="btnClear" class="btn-secondary" onclick="clearConsole()">🧹 清空控制台</button>
            </div>
        </div>

        <!-- 狀態引導欄 -->
        <div id="status" class="status-box">目前狀態：閒置中 (等待指令啟動)</div>

        <!-- 即時日誌控制台 -->
        <div id="console" class="console">--- 等待指令啟動 ---</div>
    </div>

    <script>
        let eventSource = null;

        function appendLog(message) {
            const consoleDiv = document.getElementById('console');
            const span = document.createElement('span');

            // 關鍵字著色
            if (message.includes('INFO')) span.className = 'log-info';
            else if (message.includes('WARNING')) span.className = 'log-warning';
            else if (message.includes('ERROR')) span.className = 'log-error';

            if (message.includes('✅') || message.includes('🎉') || message.includes('成功') || message.includes('完畢')) {
                span.className = 'log-success';
            }

            span.textContent = message + '\n';
            consoleDiv.appendChild(span);

            // 自動滾動到底部
            consoleDiv.scrollTop = consoleDiv.scrollHeight;
        }

        function clearConsole() {
            document.getElementById('console').innerHTML = '--- 控制台已清空 ---\n';
        }

        function runTask(type) {
            if (eventSource) {
                eventSource.close();
            }

            const allButtons = document.querySelectorAll('button');
            const statusDiv = document.getElementById('status');

            // 鎖定所有按鈕防止重複觸發與衝突
            allButtons.forEach(btn => btn.disabled = true);

            // 更新狀態顯示
            statusDiv.textContent = `目前狀態：正在執行 [${type.toUpperCase()}] 設定同步...`;
            statusDiv.className = "status-box status-busy";

            appendLog(`\n[${new Date().toLocaleTimeString()}] >>>>> 啟動 ${type.toUpperCase()} 設定同步 <<<<<`);

            const url = `/api/run/${type}`;
            eventSource = new EventSource(url);

            eventSource.onmessage = function (event) {
                appendLog(event.data);
            };

            eventSource.onerror = function (err) {
                console.log("SSE Stream ended.");
                eventSource.close();
                eventSource = null;

                // 解鎖所有按鈕
                allButtons.forEach(btn => btn.disabled = false);

                statusDiv.textContent = `目前狀態：[${type.toUpperCase()}] 設定同步結束 (閒置中)`;
                statusDiv.className = "status-box";
                appendLog(`[${new Date().toLocaleTimeString()}] <<<<< ${type.toUpperCase()} 設定同步完成 >>>>>\n`);
            };
        }
    </script>
</body>

</html>
